<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="房貸 × ETF 現金流儀表板 — 掌握房貸、投資與現金流" />
  <title>房貸 × ETF 現金流儀表板</title>

  <!-- Google Fonts：Inter 提供清晰的數字顯示，支援 tabular-nums -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ==========================================
       頂部導覽列
       之後可在此加入：帳號圖示、通知鈴聲、設定齒輪
  ========================================== -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="header-icon">⬡</span>
        <div>
          <h1 class="header-title">房貸 × ETF</h1>
          <p class="header-subtitle">現金流儀表板</p>
        </div>
      </div>
      <!-- 日期標籤：由 script.js 動態填入 -->
      <div class="header-date" id="headerDate"></div>
    </div>
  </header>


  <!-- ==========================================
       主要內容區域
  ========================================== -->
  <main class="app-main">

    <!-- ──────────────────────────────────────
         區塊 1：房貸資訊卡
         未來擴充：點擊進入「房貸試算頁」
    ────────────────────────────────────── -->
    <section class="card card--mortgage" aria-label="房貸資訊">
      <div class="card-header">
        <span class="card-icon">🏠</span>
        <h2 class="card-title">房貸資訊</h2>
        <span class="card-badge badge--info">浮動利率</span>
      </div>

      <div class="card-metrics">
        <!-- 主要指標：每月房貸 -->
        <div class="metric metric--primary">
          <span class="metric-label">每月還款</span>
          <span class="metric-value" id="mortgageMonthly">-- </span>
          <span class="metric-unit">元</span>
        </div>
      </div>

      <div class="card-divider"></div>

      <!-- 次要指標列 -->
      <div class="card-stats">
        <div class="stat">
          <span class="stat-label">剩餘本金</span>
          <span class="stat-value" id="mortgagePrincipal">--</span>
        </div>
        <div class="stat-separator"></div>
        <div class="stat">
          <span class="stat-label">目前利率</span>
          <span class="stat-value stat--highlight" id="mortgageRate">--</span>
        </div>
        <div class="stat-separator"></div>
        <div class="stat">
          <span class="stat-label">剩餘期數</span>
          <span class="stat-value" id="mortgagePeriods">--</span>
        </div>
      </div>
    </section>


    <!-- ──────────────────────────────────────
         區塊 2：ETF 投資卡
         未來擴充：0050 定期定額進度、加碼觸發條件
    ────────────────────────────────────── -->
    <section class="card card--etf" aria-label="ETF 投資">
      <div class="card-header">
        <span class="card-icon">📈</span>
        <h2 class="card-title">ETF 投資</h2>
        <span class="card-badge badge--success" id="etfReturnBadge">+0.00%</span>
      </div>

      <div class="card-metrics">
        <!-- 主要指標：持有市值 -->
        <div class="metric metric--primary">
          <span class="metric-label">持有市值</span>
          <span class="metric-value metric--green" id="etfMarketValue">--</span>
          <span class="metric-unit">元</span>
        </div>
      </div>

      <div class="card-divider"></div>

      <div class="card-stats">
        <div class="stat">
          <span class="stat-label">投入成本</span>
          <span class="stat-value" id="etfCost">--</span>
        </div>
        <div class="stat-separator"></div>
        <div class="stat">
          <span class="stat-label">未實現損益</span>
          <span class="stat-value stat--green" id="etfProfit">--</span>
        </div>
        <div class="stat-separator"></div>
        <div class="stat">
          <span class="stat-label">報酬率</span>
          <span class="stat-value stat--green" id="etfReturnRate">--</span>
        </div>
      </div>
    </section>


    <!-- ──────────────────────────────────────
         區塊 3：現金管理卡
         未來擴充：各銀行帳戶明細、定存到期提醒
    ────────────────────────────────────── -->
    <section class="card card--cash" aria-label="現金管理">
      <div class="card-header">
        <span class="card-icon">💰</span>
        <h2 class="card-title">現金管理</h2>
      </div>

      <div class="card-metrics">
        <!-- 主要指標：緊急預備金 -->
        <div class="metric metric--primary">
          <span class="metric-label">緊急預備金</span>
          <span class="metric-value" id="cashReserve">--</span>
          <span class="metric-unit">元</span>
        </div>
      </div>

      <div class="card-divider"></div>

      <div class="card-stats">
        <div class="stat">
          <span class="stat-label">可加碼資金</span>
          <span class="stat-value stat--orange" id="cashAvailable">--</span>
        </div>
        <div class="stat-separator"></div>
        <div class="stat">
          <span class="stat-label">定存活存</span>
          <span class="stat-value" id="cashDeposit">--</span>
        </div>
        <div class="stat-separator"></div>
        <div class="stat">
          <span class="stat-label">活儲利息</span>
          <span class="stat-value stat--green" id="cashInterest">--</span>
        </div>
      </div>
    </section>


    <!-- ──────────────────────────────────────
         區塊 4：本月現金流卡
         未來擴充：每月自動結算、支出分類圖表
    ────────────────────────────────────── -->
    <section class="card card--cashflow" aria-label="本月現金流">
      <div class="card-header">
        <span class="card-icon">📊</span>
        <h2 class="card-title">本月現金流</h2>
        <!-- 結餘狀態：由 script.js 依正負值動態切換 class -->
        <span class="card-badge" id="cashflowStatusBadge">計算中</span>
      </div>

      <!-- 現金流長條進度條 -->
      <div class="cashflow-bar-wrap" aria-hidden="true">
        <div class="cashflow-bar">
          <div class="cashflow-bar-fill" id="cashflowBarFill"></div>
        </div>
        <div class="cashflow-bar-labels">
          <span>支出</span>
          <span>收入</span>
        </div>
      </div>

      <div class="card-divider"></div>

      <div class="card-stats">
        <div class="stat">
          <span class="stat-label">收入</span>
          <span class="stat-value stat--green" id="cfIncome">--</span>
        </div>
        <div class="stat-separator"></div>
        <div class="stat">
          <span class="stat-label">支出</span>
          <span class="stat-value stat--red" id="cfExpense">--</span>
        </div>
        <div class="stat-separator"></div>
        <div class="stat">
          <span class="stat-label">結餘</span>
          <span class="stat-value stat--green" id="cfBalance">--</span>
        </div>
      </div>
    </section>


    <!-- ──────────────────────────────────────
         底部大型 CTA 按鈕
         之後每個功能模組都會有各自的按鈕或頁面
    ────────────────────────────────────── -->
    <div class="cta-wrap">
      <button class="btn-cta" id="btnStart" onclick="handleStartButton()">
        <span class="btn-icon">⚡</span>
        開始試算
      </button>
      <p class="cta-hint">房貸 · 定期定額 · 加碼策略</p>
    </div>

  </main>


  <!-- ==========================================
       底部版權列
  ========================================== -->
  <footer class="app-footer">
    <p>資料僅供參考 · 非投資建議</p>
    <p id="footerYear"></p>
  </footer>


  <script src="script.js"></script>
</body>
</html>
